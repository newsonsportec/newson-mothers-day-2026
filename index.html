<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Happy Mother's Day | Newson Sportec</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #000;
      font-family: Arial, Helvetica, sans-serif;
      overflow-x: hidden;
    }

    .page {
      width: 100%;
      min-height: 100vh;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px;
    }

    .poster {
      position: relative;
      width: 100%;
      max-width: 1400px;
      aspect-ratio: 1 / 1;
      background-image: url("mothers-day-main.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      overflow: hidden;
      border-radius: 18px;
      box-shadow: 0 0 35px rgba(170, 255, 0, 0.35);
    }

    /*
      Invisible clickable area.
      It covers the "Happy Mother's Day" words,
      but users will NOT see any green rectangle.
    */
    .mother-click-area {
      position: absolute;
      left: 3.5%;
      top: 13.5%;
      width: 44.5%;
      height: 26.5%;
      background: transparent;
      border: none;
      cursor: pointer;
      z-index: 12;
      padding: 0;
    }

    .mother-click-area:focus {
      outline: none;
    }

    /*
      This is the visible button below "Happy Mother's Day".
    */
    .instruction {
      position: absolute;
      left: 4.2%;
      top: 43.5%;
      z-index: 15;

      color: #ffffff;
      background: rgba(0, 0, 0, 0.72);
      border: 1px solid rgba(170, 255, 0, 0.75);
      padding: 10px 20px;
      border-radius: 999px;
      font-size: clamp(13px, 1.25vw, 19px);
      font-weight: bold;
      letter-spacing: 0.5px;
      box-shadow: 0 0 14px rgba(170, 255, 0, 0.45);
      cursor: pointer;

      transition:
        transform 0.25s ease,
        box-shadow 0.25s ease,
        background 0.25s ease;
    }

    .instruction:hover {
      transform: scale(1.05);
      background: rgba(0, 0, 0, 0.86);
      box-shadow: 0 0 22px rgba(170, 255, 0, 0.75);
    }

    /*
      Mascot image.
      It is placed in the same Happy Mother's Day area.
      It appears immediately after clicking.
      It disappears after 15 seconds by JavaScript.
    */
    .mascot {
      position: absolute;
      left: 3.8%;
      top: 12%;
      width: 46%;
      height: auto;
      z-index: 10;

      opacity: 0;
      transform: scale(0.96);
      pointer-events: none;

      border-radius: 18px;
      box-shadow:
        0 0 24px rgba(255, 160, 190, 0.75),
        0 0 34px rgba(170, 255, 0, 0.38);

      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    .poster.show-mascot .mascot {
      opacity: 1;
      transform: scale(1);
    }

    .poster.show-mascot .instruction {
      opacity: 0;
      pointer-events: none;
    }

    .instagram-link {
      position: absolute;
      right: 4%;
      bottom: 4%;
      z-index: 20;

      color: #b7ff00;
      background: rgba(0, 0, 0, 0.72);
      border: 1px solid rgba(183, 255, 0, 0.8);
      text-decoration: none;
      padding: 12px 22px;
      border-radius: 999px;
      font-size: clamp(13px, 1.2vw, 18px);
      font-weight: bold;
      letter-spacing: 0.8px;
      box-shadow: 0 0 16px rgba(183, 255, 0, 0.45);
    }

    .instagram-link:hover {
      background: rgba(183, 255, 0, 0.16);
      box-shadow: 0 0 25px rgba(183, 255, 0, 0.85);
    }

    @media (max-width: 700px) {
      .page {
        padding: 8px;
      }

      .poster {
        border-radius: 10px;
      }

      .mother-click-area {
        left: 3.2%;
        top: 13.2%;
        width: 45.5%;
        height: 27%;
      }

      .mascot {
        left: 3.8%;
        top: 13%;
        width: 46%;
        border-radius: 10px;
      }

      .instruction {
        left: 4.5%;
        top: 43.5%;
        padding: 8px 14px;
        font-size: 13px;
      }

      .instagram-link {
        right: 3%;
        bottom: 3%;
        padding: 9px 14px;
      }
    }
  </style>
</head>

<body>

  <main class="page">
    <section class="poster" id="poster">

      <!-- Mascot image appears after clicking -->
      <img
        src="mascot-flowers.png"
        alt="Newson Sportec mascot carrying flowers"
        class="mascot"
        id="mascot"
      />

      <!-- Invisible clickable area over Happy Mother's Day words -->
      <button
        class="mother-click-area"
        id="motherClickArea"
        aria-label="Click Happy Mother's Day to show mascot"
        title="Click Happy Mother's Day"
      ></button>

      <!-- Visible click button below Happy Mother's Day -->
      <button
        class="instruction"
        id="instructionButton"
        aria-label="Click Happy Mother's Day"
      >
        Click “Happy Mother’s Day”
      </button>

      <a
        class="instagram-link"
        href="https://www.instagram.com/newsonsportec/"
        target="_blank"
        rel="noopener noreferrer"
      >
        Follow Newson Sportec
      </a>

    </section>
  </main>

  <script>
    const poster = document.getElementById("poster");
    const motherClickArea = document.getElementById("motherClickArea");
    const instructionButton = document.getElementById("instructionButton");

    let mascotTimer;

    function showMascotFor15Seconds() {
      clearTimeout(mascotTimer);

      poster.classList.add("show-mascot");

      mascotTimer = setTimeout(function () {
        poster.classList.remove("show-mascot");
      }, 15000);
    }

    motherClickArea.addEventListener("click", showMascotFor15Seconds);
    instructionButton.addEventListener("click", showMascotFor15Seconds);
  </script>

</body>
</html>
