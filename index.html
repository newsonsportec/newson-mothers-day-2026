<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Happy Mother's Day | Newson Sportec</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #000;
      font-family: Arial, Helvetica, sans-serif;
      overflow-x: hidden;
    }

    .page {
      width: 100%;
      min-height: 100vh;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px;
    }

    .poster {
      position: relative;
      width: 100%;
      max-width: 1400px;
      aspect-ratio: 1 / 1;
      background-image: url("mothers-day-main.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      overflow: hidden;
      border-radius: 18px;
      box-shadow: 0 0 35px rgba(170, 255, 0, 0.35);
    }

    /*
      Invisible clickable area.
      No green rectangle.
      Users can click the Happy Mother's Day words area.
    */
    .mother-click-area {
      position: absolute;
      left: 3.5%;
      top: 18.5%;
      width: 43%;
      height: 22%;
      background: transparent;
      border: none;
      cursor: pointer;
      z-index: 20;
      padding: 0;
    }

    .mother-click-area:focus {
      outline: none;
    }

    /*
      Twinkling effect over the Happy Mother's Day words.
      This does NOT cover the words.
      It only adds small glowing sparkles.
    */
    .twinkle-layer {
      position: absolute;
      left: 3.5%;
      top: 18.5%;
      width: 43%;
      height: 22%;
      z-index: 9;
      pointer-events: none;
      overflow: hidden;
    }

    .sparkle {
      position: absolute;
      width: 9px;
      height: 9px;
      background: #c6ff00;
      border-radius: 50%;
      box-shadow:
        0 0 8px #c6ff00,
        0 0 18px #c6ff00,
        0 0 28px rgba(198, 255, 0, 0.9);
      animation: twinkle 1.8s infinite ease-in-out;
      opacity: 0;
    }

    .sparkle:nth-child(1) {
      left: 12%;
      top: 16%;
      animation-delay: 0s;
    }

    .sparkle:nth-child(2) {
      left: 38%;
      top: 24%;
      animation-delay: 0.4s;
    }

    .sparkle:nth-child(3) {
      left: 70%;
      top: 18%;
      animation-delay: 0.8s;
    }

    .sparkle:nth-child(4) {
      left: 22%;
      top: 68%;
      animation-delay: 1.1s;
    }

    .sparkle:nth-child(5) {
      left: 58%;
      top: 72%;
      animation-delay: 1.4s;
    }

    @keyframes twinkle {
      0% {
        opacity: 0;
        transform: scale(0.2) rotate(0deg);
      }

      45% {
        opacity: 1;
        transform: scale(1.4) rotate(180deg);
      }

      100% {
        opacity: 0;
        transform: scale(0.2) rotate(360deg);
      }
    }

    /*
      Mascot appears in the same Happy Mother's Day area.
      It replaces the flowers.
    */
    .mascot-flowers {
      position: absolute;
      left: 4.5%;
      top: 12.5%;
      width: 42%;
      height: auto;
      z-index: 12;

      opacity: 0;
      transform: scale(0.05);
      transform-origin: center center;

      border-radius: 18px;
      box-shadow:
        0 0 25px rgba(255, 150, 190, 0.7),
        0 0 35px rgba(170, 255, 0, 0.45);

      transition:
        opacity 1s ease,
        transform 1.35s ease,
        filter 1.35s ease;

      filter: brightness(1.03);
      pointer-events: none;
    }

    .poster.show-mascot .mascot-flowers {
      opacity: 1;
      transform: scale(1);
    }

    /*
      Hide twinkles after mascot appears.
    */
    .poster.show-mascot .twinkle-layer {
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    /*
      This is the only visible click button.
      It is below the Happy Mother's Day words.
    */
    .instruction {
      position: absolute;
      left: 4.3%;
      top: 43.5%;
      z-index: 25;

      color: #ffffff;
      background: rgba(0, 0, 0, 0.72);
      border: 1px solid rgba(170, 255, 0, 0.75);
      padding: 10px 22px;
      border-radius: 999px;
      font-size: clamp(13px, 1.25vw, 19px);
      font-weight: bold;
      letter-spacing: 0.5px;
      box-shadow: 0 0 14px rgba(170, 255, 0, 0.45);
      cursor: pointer;

      transition:
        opacity 0.5s ease,
        transform 0.25s ease,
        box-shadow 0.25s ease;
    }

    .instruction:hover {
      transform: scale(1.05);
      box-shadow: 0 0 22px rgba(170, 255, 0, 0.85);
    }

    .poster.show-mascot .instruction {
      opacity: 0;
      pointer-events: none;
    }

    .instagram-link {
      position: absolute;
      right: 4%;
      bottom: 4%;
      z-index: 25;

      color: #b7ff00;
      background: rgba(0, 0, 0, 0.72);
      border: 1px solid rgba(183, 255, 0, 0.8);
      text-decoration: none;
      padding: 12px 22px;
      border-radius: 999px;
      font-size: clamp(13px, 1.2vw, 18px);
      font-weight: bold;
      letter-spacing: 0.8px;
      box-shadow: 0 0 16px rgba(183, 255, 0, 0.45);
    }

    .instagram-link:hover {
      background: rgba(183, 255, 0, 0.16);
      box-shadow: 0 0 25px rgba(183, 255, 0, 0.85);
    }

    @media (max-width: 700px) {
      .page {
        padding: 8px;
      }

      .poster {
        border-radius: 10px;
      }

      .mother-click-area {
        left: 3.2%;
        top: 18.5%;
        width: 45%;
        height: 22%;
      }

      .twinkle-layer {
        left: 3.2%;
        top: 18.5%;
        width: 45%;
        height: 22%;
      }

      .mascot-flowers {
        left: 4%;
        top: 13%;
        width: 44%;
      }

      .instruction {
        left: 4.5%;
        top: 43.5%;
        padding: 8px 14px;
        font-size: 13px;
      }

      .instagram-link {
        right: 3%;
        bottom: 3%;
        padding: 9px 14px;
      }
    }
  </style>
</head>

<body>

  <main class="page">
    <section class="poster" id="poster">

      <!-- Mascot image appears after clicking -->
      <img
        src="mascot-flowers.png"
        alt="Newson Sportec dog mascot carrying pink flowers"
        class="mascot-flowers"
      />

      <!-- Twinkling sparkles over Happy Mother's Day words -->
      <div class="twinkle-layer" aria-hidden="true">
        <span class="sparkle"></span>
        <span class="sparkle"></span>
        <span class="sparkle"></span>
        <span class="sparkle"></span>
        <span class="sparkle"></span>
      </div>

      <!-- Invisible clickable area over Happy Mother's Day -->
      <button
        class="mother-click-area"
        id="motherClickArea"
        aria-label="Click Happy Mother's Day to show Newson Sportec mascot"
        title="Click Happy Mother's Day"
      ></button>

      <!-- Visible click button below Happy Mother's Day -->
      <button
        class="instruction"
        id="instructionButton"
        aria-label="Click Happy Mother's Day"
      >
        Click “Happy Mother’s Day”
      </button>

      <a
        class="instagram-link"
        href="https://www.instagram.com/newsonsportec/"
        target="_blank"
        rel="noopener noreferrer"
      >
        Follow Newson Sportec
      </a>

    </section>
  </main>

  <script>
    const poster = document.getElementById("poster");
    const motherClickArea = document.getElementById("motherClickArea");
    const instructionButton = document.getElementById("instructionButton");

    function showMascot() {
      poster.classList.add("show-mascot");
    }

    motherClickArea.addEventListener("click", showMascot);
    instructionButton.addEventListener("click", showMascot);
  </script>

</body>
</html>
