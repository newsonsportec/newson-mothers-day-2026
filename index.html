<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Happy Mother's Day | Newson Sportec</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #000;
      font-family: Arial, Helvetica, sans-serif;
      overflow-x: hidden;
    }

    .page {
      width: 100%;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #000;
      padding: 20px;
    }

    .poster {
      position: relative;
      width: 100%;
      max-width: 1400px;
      aspect-ratio: 1 / 1;
      background-image: url("mothers-day-main.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      overflow: hidden;
      border-radius: 18px;
      box-shadow: 0 0 35px rgba(143, 255, 0, 0.45);
    }

    /*
      This invisible button is placed on top of the
      "Happy Mother's Day" words area.
    */
    .mother-button {
      position: absolute;
      left: 4%;
      top: 20%;
      width: 42%;
      height: 22%;
      background: transparent;
      border: none;
      cursor: pointer;
      z-index: 5;
    }

    .mother-button:focus {
      outline: 3px solid rgba(160, 255, 0, 0.9);
      outline-offset: 4px;
      border-radius: 20px;
    }

    /*
      Flower image starts very small and hidden.
      After clicking, it grows smoothly.
    */
    .flowers {
      position: absolute;
      left: 5%;
      top: 19%;
      width: 42%;
      z-index: 4;

      opacity: 0;
      transform: scale(0.05);
      transform-origin: center center;

      transition:
        transform 1.4s ease,
        opacity 1.1s ease,
        filter 1.4s ease;

      filter: drop-shadow(0 0 0 rgba(255, 120, 170, 0));
      pointer-events: none;
    }

    .poster.show-flowers .flowers {
      opacity: 1;
      transform: scale(1);
      filter: drop-shadow(0 0 22px rgba(255, 120, 170, 0.75));
    }

    .hint {
      position: absolute;
      left: 6%;
      top: 43%;
      z-index: 6;
      color: white;
      font-size: clamp(14px, 1.5vw, 22px);
      letter-spacing: 1px;
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid rgba(160, 255, 0, 0.65);
      padding: 10px 18px;
      border-radius: 999px;
      box-shadow: 0 0 14px rgba(160, 255, 0, 0.35);
      transition: opacity 0.5s ease;
    }

    .poster.show-flowers .hint {
      opacity: 0;
    }

    .top-link {
      position: absolute;
      right: 4%;
      bottom: 4%;
      z-index: 10;
      text-decoration: none;
      color: #b7ff00;
      background: rgba(0, 0, 0, 0.68);
      border: 1px solid rgba(183, 255, 0, 0.75);
      padding: 12px 20px;
      border-radius: 999px;
      font-size: clamp(13px, 1.3vw, 18px);
      font-weight: bold;
      letter-spacing: 1px;
      box-shadow: 0 0 15px rgba(183, 255, 0, 0.35);
    }

    .top-link:hover {
      background: rgba(183, 255, 0, 0.15);
      box-shadow: 0 0 24px rgba(183, 255, 0, 0.7);
    }

    @media (max-width: 700px) {
      .page {
        padding: 8px;
      }

      .poster {
        border-radius: 8px;
      }

      .mother-button {
        left: 3%;
        top: 19%;
        width: 47%;
        height: 24%;
      }

      .flowers {
        left: 4%;
        top: 21%;
        width: 45%;
      }

      .hint {
        left: 5%;
        top: 45%;
        padding: 7px 12px;
      }

      .top-link {
        right: 3%;
        bottom: 3%;
        padding: 9px 14px;
      }
    }
  </style>
</head>

<body>

  <main class="page">
    <section class="poster" id="poster">

      <!-- Flower image -->
      <img
        src="flowers.png"
        alt="Pink carnations, roses, and tulips for Mother's Day"
        class="flowers"
      />

      <!-- Invisible clickable area over Happy Mother's Day -->
      <button
        class="mother-button"
        id="motherButton"
        aria-label="Click Happy Mother's Day to grow flowers"
        title="Click Happy Mother's Day"
      ></button>

      <div class="hint">
        Click “Happy Mother’s Day”
      </div>

      <a
        class="top-link"
        href="https://www.instagram.com/newsonsportec/"
        target="_blank"
        rel="noopener noreferrer"
      >
        Follow Newson Sportec
      </a>

    </section>
  </main>

  <script>
    const poster = document.getElementById("poster");
    const motherButton = document.getElementById("motherButton");

    motherButton.addEventListener("click", function () {
      poster.classList.toggle("show-flowers");
    });
  </script>

</body>
</html>
